function saveUserSettings(){
  try {
    localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify({
      skill: currentSkill,
      pieceTheme: currentPieceTheme,
      boardTheme: currentBoardTheme,
      backgroundTheme: currentBackgroundTheme,
      geminiCoachStyle,
      opponentCommentaryEnabled
    }));
  } catch {
    // Some browser privacy modes disable local storage; the game still works normally.
  }
}

function restoreUserSettings(){
  try {
    const saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || '{}');
    if (Number.isInteger(saved.skill) && saved.skill >= 1 && saved.skill <= 20){
      currentSkill = saved.skill;
      currentDiff = getDifficultyConfig(currentSkill);
    }
    if (saved.pieceTheme in PIECE_THEMES) currentPieceTheme = saved.pieceTheme;
    if (BOARD_THEME_IDS.has(saved.boardTheme)) currentBoardTheme = saved.boardTheme;
    if (BACKGROUND_THEME_IDS.has(saved.backgroundTheme)) currentBackgroundTheme = saved.backgroundTheme;
    if (typeof saved.geminiCoachStyle === 'string' && saved.geminiCoachStyle in AI_COACH_STYLES) geminiCoachStyle = saved.geminiCoachStyle;
    opponentCommentaryEnabled = saved.opponentCommentaryEnabled === true;
  } catch {
    // Ignore invalid or old saved settings and keep the defaults.
  }

  pieceThemeEl.value = currentPieceTheme;
  boardThemeEl.value = currentBoardTheme;
  backgroundThemeEl.value = currentBackgroundTheme;
  geminiCoachStyleEl.innerHTML = Object.entries(AI_COACH_STYLES)
    .map(([id, style]) => `<option value="${id}">${style.label}</option>`)
    .join('');
  geminiCoachStyleEl.value = geminiCoachStyle;
  syncOpponentCommentaryUi();
  refreshGeminiConnectionStatus();
  document.documentElement.dataset.boardTheme = currentBoardTheme === 'wood' ? '' : currentBoardTheme;
  document.documentElement.dataset.backgroundTheme = currentBackgroundTheme === 'white' ? '' : currentBackgroundTheme;
  syncDifficultyUi();
}

function log(msg){
  return;
}

function getDifficultyConfig(skill){
  const normalized = Math.max(1, Math.min(20, parseInt(skill, 10) || 8));
  const movetime = 250 + Math.round(((normalized - 1) / 19) * 2250);
  return {skill: normalized, movetime};
}

function getDifficultyTierLabel(skill){
  if (skill <= 4) return '초급';
  if (skill <= 9) return '중급';
  if (skill <= 15) return '상급';
  return '최강';
}

function syncDifficultyUi(){
  difficultyEl.value = String(currentSkill);
  difficultyLabelEl.textContent = getDifficultyTierLabel(currentSkill);
  difficultyValueEl.textContent = `Skill ${currentSkill}`;
}

function getPieceImage(pieceKey){
  const theme = PIECE_THEMES[currentPieceTheme] || PIECE_THEMES.wikimedia;
  return theme[pieceKey] || PIECE_THEMES.wikimedia[pieceKey];
}

function loadEngine(){
  engineReady = false;
  waitingFor = 'uciok';
  statusText.textContent = '엔진 파일 내려받는 중…';
  hideRetry();
  log('요청: ' + ENGINE_URL);

  fetch(ENGINE_URL)
    .then(r => {
      log('응답 상태: ' + r.status);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(code => {
      log('스크립트 수신 완료 (' + code.length + ' bytes)');
      const blob = new Blob([code], {type:'application/javascript'});
      engineWorkerUrl = URL.createObjectURL(blob);
      engine = new Worker(engineWorkerUrl);
      startAnalysisEngine();

      engineTimeoutId = setTimeout(() => {
        log('15초 동안 응답 없음 — 엔진 초기화 실패로 판단');
        showEngineError();
      }, 15000);

      engine.onmessage = (e) => {
        log('엔진 → ' + (typeof e.data === 'string' ? e.data : '[data]'));
        onEngineMessage(e);
      };
      engine.onerror = (e) => {
        log('워커 오류: ' + (e.message || '알 수 없는 오류'));
        clearTimeout(engineTimeoutId);
        showEngineError();
      };

      statusText.textContent = '엔진 초기화 중…';
      engine.postMessage('uci');
    })
    .catch(err => {
      log('로드 실패: ' + err.message);
      showEngineError();
    });
}

function showEngineError(){
  statusText.textContent = '엔진 로드 실패';
  showRetry();
}

function showRetry(){
  if (document.getElementById('retryBtn')) return;
  const btn = document.createElement('button');
  btn.id = 'retryBtn';
  btn.textContent = '다시 시도';
  btn.style.cssText = 'margin-left:10px;font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--brass-dim);background:transparent;color:var(--brass);cursor:pointer;';
  btn.addEventListener('click', loadEngine);
  statusEl.appendChild(btn);
}
function hideRetry(){
  const btn = document.getElementById('retryBtn');
  if (btn) btn.remove();
}

function startAnalysisEngine(){
  if (!engineWorkerUrl) return;
  if (analysisEngine) analysisEngine.terminate();
  analysisEngine = new Worker(engineWorkerUrl);
  analysisEngineReady = false;
  analysisWaitingFor = 'uciok';
  activeAnalysisJob = null;
  analysisEngine.onmessage = onAnalysisEngineMessage;
  analysisEngine.onerror = () => {
    analysisEngineReady = false;
  };
  analysisEngine.postMessage('uci');
}

function onEngineMessage(e){
  if (engineTimeoutId) clearTimeout(engineTimeoutId);
  const line = typeof e.data === 'string' ? e.data : '';
  
  if (waitingFor === 'uciok' && line === 'uciok'){
    engine.postMessage('setoption name Skill Level value ' + currentDiff.skill);
    engine.postMessage('setoption name MultiPV value 3');
    engine.postMessage('isready');
    waitingFor = 'readyok';
    return;
  }
  if (waitingFor === 'readyok' && line === 'readyok'){
    engineReady = true;
    waitingFor = null;
    engine.postMessage('ucinewgame');
    updateStatus();
    maybeEngineMove();
    return;
  }

  if (line.startsWith('bestmove')){
    const parts = line.split(' ');
    const uciMove = parts[1];
    
    if (engineThinking) {
      engineThinking = false;
      if (uciMove && uciMove !== '(none)'){
        applyUciMove(uciMove);
      }
      updateStatus();
      setTimeout(maybeEngineMove, 200);
    } else {
      // 플레이어 턴일 때 수행한 백그라운드 분석 결과의 bestmove는 대국판에 적용하지 않고 폐기
      engineThinking = false;
    }
  }
}

function cpToPawns(scoreW){
  return scoreW / 100;
}

function snapshotAnalysis(){
  return {
    fen: latestAnalysis.fen,
    lines: latestAnalysis.lines.map((line) => ({...line}))
  };
}

function formatUciAsSan(fen, uci){
  if (!fen || !uci || uci === '(none)') return null;
  try {
    const tempGame = new Chess(fen);
    const move = tempGame.move({
      from: uci.slice(0,2),
      to: uci.slice(2,4),
      promotion: uci.length > 4 ? uci[4] : undefined
    });
    return move ? move.san : uci;
  } catch {
    return uci;
  }
}

function parseAnalysisLine(parts, fen){
  const pvIdx = parts.indexOf('pv');
  if (pvIdx === -1 || pvIdx + 1 >= parts.length) return null;

  const scoreIdx = parts.indexOf('score');
  if (scoreIdx === -1 || scoreIdx + 2 >= parts.length) return null;

  const multiPvIdx = parts.indexOf('multipv');
  const multipv = multiPvIdx !== -1 ? parseInt(parts[multiPvIdx + 1], 10) : 1;
  const pvMoves = parts.slice(pvIdx + 1).filter(Boolean);
  const bestUci = pvMoves[0];
  if (!bestUci) return null;

  const type = parts[scoreIdx + 1];
  const rawValue = parseInt(parts[scoreIdx + 2], 10);
  if (Number.isNaN(rawValue)) return null;

  let scoreW = rawValue;
  if (String(fen).split(/\s+/)[1] === 'b') scoreW = -scoreW;

  return {
    multipv,
    uci: bestUci,
    san: formatUciAsSan(fen, bestUci) || bestUci,
    pv: pvMoves.slice(0, 10),
    type,
    scoreW,
    depth: parseInt(parts[parts.indexOf('depth') + 1], 10) || 0
  };
}

function commitPositionAnalysis(result){
  analysisCache.set(result.fen, result);
  if (game.fen() === result.fen){
    latestAnalysis = {fen:result.fen, lines:result.lines.map((line) => ({...line, pv:[...line.pv]}))};
    stableHintAnalysis = snapshotAnalysis();
    latestEval = result.eval ? {...result.eval, fen:result.fen} : null;
    updateHintDisplay();
    renderEvaluationText();
  }
  finalizeReadyCommentaries();
}

function pumpAnalysisQueue(){
  if (!analysisEngineReady || activeAnalysisJob || !analysisQueue.length) return;
  activeAnalysisJob = analysisQueue.shift();
  activeAnalysisJob.lines = [];
  analysisEngine.postMessage('position fen ' + activeAnalysisJob.fen);
  analysisEngine.postMessage('go depth ' + COMMENTARY_MIN_DEPTH);
}

function enqueuePositionAnalysis(fen){
  if (!fen || analysisCache.has(fen)){
    if (fen && analysisCache.has(fen)) commitPositionAnalysis(analysisCache.get(fen));
    return;
  }
  try {
    const position = new Chess(fen);
    if (position.in_checkmate()){
      const winner = position.turn() === 'w' ? 'b' : 'w';
      commitPositionAnalysis({
        fen,
        lines:[],
        eval:{type:'mate', scoreW:winner === 'w' ? 1 : -1, depth:COMMENTARY_MIN_DEPTH, fen}
      });
      return;
    }
    if (position.in_draw()){
      commitPositionAnalysis({
        fen,
        lines:[],
        eval:{type:'cp', scoreW:0, depth:COMMENTARY_MIN_DEPTH, fen}
      });
      return;
    }
  } catch {
    return;
  }
  if (activeAnalysisJob?.fen === fen || analysisQueue.some((job) => job.fen === fen)) return;
  analysisQueue.push({fen, generation:analysisGeneration, lines:[]});
  pumpAnalysisQueue();
}

function onAnalysisEngineMessage(e){
  const line = typeof e.data === 'string' ? e.data : '';
  if (analysisWaitingFor === 'uciok' && line === 'uciok'){
    analysisEngine.postMessage('setoption name Skill Level value 20');
    analysisEngine.postMessage('setoption name MultiPV value 3');
    analysisEngine.postMessage('isready');
    analysisWaitingFor = 'readyok';
    return;
  }
  if (analysisWaitingFor === 'readyok' && line === 'readyok'){
    analysisEngineReady = true;
    analysisWaitingFor = null;
    analysisEngine.postMessage('ucinewgame');
    pumpAnalysisQueue();
    return;
  }
  if (!activeAnalysisJob) return;

  if (line.startsWith('info ') && line.includes(' score ')){
    const parsed = parseAnalysisLine(line.split(' '), activeAnalysisJob.fen);
    if (!parsed) return;
    activeAnalysisJob.lines = activeAnalysisJob.lines.filter((item) => item.multipv !== parsed.multipv);
    activeAnalysisJob.lines.push(parsed);
    activeAnalysisJob.lines.sort((a, b) => a.multipv - b.multipv);
    activeAnalysisJob.lines = activeAnalysisJob.lines.slice(0, 3);
    return;
  }

  if (line.startsWith('bestmove')){
    const completed = activeAnalysisJob;
    activeAnalysisJob = null;
    const stableLines = completed.lines.filter((item) => item.type === 'mate' || item.depth >= COMMENTARY_MIN_DEPTH);
    if (completed.generation === analysisGeneration && stableLines.length){
      const best = stableLines.find((item) => item.multipv === 1) || stableLines[0];
      commitPositionAnalysis({
        fen:completed.fen,
        lines:stableLines.map((item) => ({...item, pv:[...item.pv]})),
        eval:{type:best.type, scoreW:best.scoreW, depth:best.depth, fen:completed.fen}
      });
    }
    pumpAnalysisQueue();
  }
}

function formatEvalForText(evalInfo){
  if (!evalInfo) return '평가 없음';
  if (evalInfo.type === 'mate'){
    return evalInfo.scoreW > 0 ? `백 메이트 ${evalInfo.scoreW}` : `흑 메이트 ${Math.abs(evalInfo.scoreW)}`;
  }
  const pawns = cpToPawns(evalInfo.scoreW);
  const sign = pawns > 0 ? '+' : '';
  return `${sign}${pawns.toFixed(2)}`;
}

function getHintMove(){
  if (!shouldShowHint() || stableHintAnalysis.fen !== game.fen() || !stableHintAnalysis.lines.length) return null;
  const best = stableHintAnalysis.lines[0];
  if (!best || !best.uci || best.uci.length < 4) return null;
  const from = best.uci.slice(0,2);
  const to = best.uci.slice(2,4);
  const movingPiece = game.get(from);
  return movingPiece ? {from, to, pieceKey: movingPiece.color + movingPiece.type} : null;
}

function getActiveHintSnapshot(){
  if (!shouldShowHint() || stableHintAnalysis.fen !== game.fen() || !stableHintAnalysis.lines.length) return null;
  const best = stableHintAnalysis.lines.find((line) => line.multipv === 1) || stableHintAnalysis.lines[0];
  if (!best?.uci) return null;
  return {
    fen:game.fen(),
    uci:best.uci,
    san:best.san || '',
    depth:Number.isFinite(best.depth) ? best.depth : COMMENTARY_MIN_DEPTH
  };
}

function shouldShowHint(){
  const isMyTurn = game.turn() === playerColor;
  return isMyTurn ? hintToggleEl.checked : opponentHintToggleEl.checked;
}

function updateHintDisplay(){
  if (!hintToggleEl.checked && !opponentHintToggleEl.checked){
    hintTextEl.textContent = '힌트를 켜면 추천 수가 표시됩니다.';
    render();
    return;
  }

  if (isReviewing()){
    hintTextEl.textContent = '리뷰 중에는 힌트를 숨깁니다.';
    render();
    return;
  }

  if (!shouldShowHint()){
    hintTextEl.textContent = game.turn() === playerColor
      ? '내 차례: 내 힌트를 켜세요.'
      : '상대 차례: 상대 힌트를 켜세요.';
    render();
    return;
  }

  if (stableHintAnalysis.fen !== game.fen() || !stableHintAnalysis.lines.length){
    hintTextEl.textContent = `엔진이 depth ${COMMENTARY_MIN_DEPTH}까지 분석 중입니다.`;
    render();
    return;
  }

  const best = stableHintAnalysis.lines[0];
  const alt1 = stableHintAnalysis.lines[1];
  const alt2 = stableHintAnalysis.lines[2];
  const evalText = formatEvalForText({type: best.type, scoreW: best.scoreW});
  const bestText = formatSanAtPosition(best.san, game.fen());
  const altText = [alt1?.san, alt2?.san]
    .filter(Boolean)
    .map((san) => formatSanAtPosition(san, game.fen()))
    .join(', ');
  hintTextEl.textContent = altText
    ? `추천: ${bestText} · 평가 ${evalText} · 후보 ${altText}`
    : `추천: ${bestText} · 평가 ${evalText}`;
  render();
}

function buildMoveCommentary(record){
  if (!record) return '분석 중…';
  return ChessCoachAnalysis.buildCommentary(record);
}

const MOVE_PIECE_SYMBOLS = {
  w: {p:'♙', n:'♘', b:'♗', r:'♖', q:'♕', k:'♔'},
  b: {p:'♟', n:'♞', b:'♝', r:'♜', q:'♛', k:'♚'}
};

function formatMoveForDisplay(move){
  const symbol = MOVE_PIECE_SYMBOLS[move.color]?.[move.piece] || '';
  const checkSuffix = move.san.endsWith('#') ? ' #' : move.san.endsWith('+') ? ' +' : '';
  if (move.san.startsWith('O-O')) return `${symbol} ${move.san.replace(/[+#]$/, '')}${checkSuffix}`;

  const details = [];
  if (move.captured){
    const capturedColor = move.color === 'w' ? 'b' : 'w';
    details.push(`${MOVE_PIECE_SYMBOLS[capturedColor][move.captured]} 잡기`);
  }
  if (move.promotion){
    details.push(`${MOVE_PIECE_SYMBOLS[move.color][move.promotion]} 승격`);
  }
  return `${symbol} ${move.to}${details.length ? ` (${details.join(' · ')})` : ''}${checkSuffix}`;
}

function parseSanAtPosition(san, fen){
  if (!san || !fen) return null;
  try {
    const position = new Chess(fen);
    return position.move(san, {sloppy:true});
  } catch {
    return null;
  }
}

function formatSanAtPosition(san, fen){
  const move = parseSanAtPosition(san, fen);
  return move ? formatMoveForDisplay(move) : san;
}

function formatExpectedMoves(text, fen){
  if (!text || !fen) return text || '';
  try {
    const position = new Chess(fen);
    return text.split(/\s+/).filter(Boolean).map((san) => {
      const move = position.move(san, {sloppy:true});
      return move ? formatMoveForDisplay(move) : san;
    }).join('  ');
  } catch {
    return text;
  }
}

function formatAlternativeMoves(text, fen){
  if (!text || !fen) return text || '';
  return text.split(/(\s+또는\s+|\s*,\s*)/).map((part) => {
    if (!part.trim() || /^(또는|,)$/.test(part.trim())) return part;
    return formatSanAtPosition(part.trim(), fen);
  }).join('');
}

function getCommentaryMoveDisplays(entry){
  const record = entry?.analysis;
  if (!record) return [];
  const displays = new Map();
  const addMove = (san, fen) => {
    const formatted = formatSanAtPosition(san, fen);
    if (san && formatted !== san) displays.set(san, formatted);
  };

  addMove(entry.san, record.fenBefore);
  addMove(record.bestMove, record.fenBefore);
  (record.alternatives || []).forEach((san) => addMove(san, record.fenBefore));
  addMove(record.verifiedTactic?.moveSan, record.fenAfter);

  try {
    const position = new Chess(record.fenAfter);
    (record.consequence?.sequence || []).forEach((san) => {
      const move = position.move(san, {sloppy:true});
      if (move) displays.set(san, formatMoveForDisplay(move));
    });
  } catch {}
  return [...displays.entries()].sort((a, b) => b[0].length - a[0].length);
}

function replaceMoveDisplays(text, displays){
  return displays.reduce((result, [san, formatted]) => {
    const escaped = san.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return result.replace(new RegExp(`(^|[\\s(])${escaped}(?=$|[\\s.,!?):·가-힣])`, 'g'), `$1${formatted}`);
  }, text || '');
}

function formatCommentaryText(text, entry){
  if (!text || !entry?.analysis) return text || '';
  return replaceMoveDisplays(text, getCommentaryMoveDisplays(entry));
}

function formatGameReviewText(text){
  if (!text) return '';
  const displays = new Map();
  const ambiguous = new Set();
  game.history({verbose:true}).forEach((move) => {
    const formatted = formatMoveForDisplay(move);
    if (displays.has(move.san) && displays.get(move.san) !== formatted){
      ambiguous.add(move.san);
      displays.delete(move.san);
    } else if (!ambiguous.has(move.san)){
      displays.set(move.san, formatted);
    }
  });
  return replaceMoveDisplays(text, [...displays.entries()].sort((a, b) => b[0].length - a[0].length));
}

function appendCommentaryLine(parent, className, text){
  if (!text) return;
  const line = document.createElement('div');
  line.className = className;
  line.textContent = text;
  parent.appendChild(line);
}

function appendAIReviewNote(parent, note, entry){
  if (!note) return;
  const line = document.createElement('div');
  line.className = 'ai-review-note';
  if (note.title){
    const title = document.createElement('span');
    title.className = 'ai-review-note-title';
    title.textContent = formatCommentaryText(note.title, entry);
    line.appendChild(title);
  }
  const message = [formatCommentaryText(note.comment, entry), note.innerThought ? `(${note.innerThought})` : ''].filter(Boolean).join(' ');
  if (message) line.appendChild(document.createTextNode(`${note.title ? ' - ' : ''}${message}`));
  parent.appendChild(line);
}

function renderCommentaryContent(container, content, entry){
  container.replaceChildren();
  if (!content || typeof content === 'string'){
    container.textContent = formatCommentaryText(content, entry);
    return;
  }

  appendCommentaryLine(container, 'commentary-title', formatCommentaryText(content.title, entry));
  (content.body || []).forEach((line) => appendCommentaryLine(container, 'commentary-body', formatCommentaryText(line, entry)));

  if (content.expected || content.alternative){
    const meta = document.createElement('div');
    meta.className = 'commentary-meta';
    const expected = formatExpectedMoves(content.expected, entry?.analysis?.fenAfter);
    const alternative = formatAlternativeMoves(content.alternative, entry?.analysis?.fenBefore);
    appendCommentaryLine(meta, 'commentary-meta-row', expected ? `예상 진행: ${expected}` : '');
    appendCommentaryLine(meta, 'commentary-meta-row', alternative ? `대안: ${alternative}` : '');
    container.appendChild(meta);
  }
}

function renderCommentaryPanel(color){
  const view = commentaryViews[color];
  const history = commentaryHistory[color];
  const index = commentaryIndex[color];

  if (!history.length || index < 0){
    view.textEl.textContent = view.emptyText;
    view.countEl.textContent = '0 / 0';
    view.prevBtn.disabled = true;
    view.nextBtn.disabled = true;
    renderMobileCommentary();
    return;
  }

  const entry = history[index];
  renderCommentaryContent(view.textEl, entry.text, entry);
  appendAIReviewNote(view.textEl, entry.aiReviewNote, entry);
  view.countEl.textContent = `${index + 1} / ${history.length}`;
  view.prevBtn.disabled = index <= 0;
  view.nextBtn.disabled = index >= history.length - 1;
  renderMobileCommentary();
}

function renderMobileCommentary(){
  const history = commentaryHistory[playerColor];
  const index = commentaryIndex[playerColor];
  mobileCommentaryEl.replaceChildren();

  if (!history.length || index < 0){
    const empty = document.createElement('div');
    empty.className = 'mobile-commentary-empty';
    empty.textContent = '첫 수를 두면 여기에 핵심 해설이 표시됩니다.';
    mobileCommentaryEl.appendChild(empty);
    return;
  }

  const content = history[index].text;
  if (typeof content === 'string'){
    const text = document.createElement('div');
    text.className = 'mobile-commentary-body';
    text.textContent = formatCommentaryText(content, history[index]);
    mobileCommentaryEl.appendChild(text);
    return;
  }

  const entry = history[index];
  appendCommentaryLine(mobileCommentaryEl, 'mobile-commentary-title', formatCommentaryText(content.title, entry));
  (content.body || []).slice(0, 2).forEach((line) => {
    appendCommentaryLine(mobileCommentaryEl, 'mobile-commentary-body', formatCommentaryText(line, entry));
  });
  appendAIReviewNote(mobileCommentaryEl, entry.aiReviewNote, entry);
}

function renderAllCommentaryPanels(){
  renderCommentaryPanel('w');
  renderCommentaryPanel('b');
}

function syncOpponentCommentaryUi(){
  opponentCommentaryToggleEl.checked = opponentCommentaryEnabled;
  ['w','b'].forEach((color) => {
    commentaryViews[color].panelEl.hidden = !opponentCommentaryEnabled && color !== playerColor;
  });
}

function setOpponentCommentaryEnabled(enabled){
  opponentCommentaryEnabled = Boolean(enabled);
  if (!opponentCommentaryEnabled){
    const opponentColor = playerColor === 'w' ? 'b' : 'w';
    commentaryHistory[opponentColor] = [];
    commentaryIndex[opponentColor] = -1;
    pendingCommentaries = pendingCommentaries.filter((pending) => pending.color === playerColor);
  }
  syncOpponentCommentaryUi();
  renderAllCommentaryPanels();
  updateAIReviewButton();
  saveUserSettings();
}

function getCurrentPly(){
  return game.history().length;
}

function getDisplayPly(){
  return reviewPly == null ? getCurrentPly() : Math.max(0, Math.min(reviewPly, getCurrentPly()));
}

function isReviewing(){
  return getDisplayPly() !== getCurrentPly();
}

function getDisplayState(){
  const moves = game.history({verbose:true});
  const displayPly = getDisplayPly();
  const reviewGame = new Chess();
  for (let i = 0; i < displayPly; i += 1){
    const move = moves[i];
    reviewGame.move({
      from: move.from,
      to: move.to,
      promotion: move.promotion
    });
  }
  const move = displayPly > 0 ? moves[displayPly - 1] : null;
  return {
    game: reviewGame,
    lastMove: move ? {from: move.from, to: move.to} : null,
    ply: displayPly
  };
}

function syncCommentaryToReview(){
  const displayPly = getDisplayPly();
  ['w','b'].forEach((color) => {
    const history = commentaryHistory[color];
    let targetIndex = -1;
    for (let i = 0; i < history.length; i += 1){
      if (history[i].ply <= displayPly) targetIndex = i;
    }
    commentaryIndex[color] = targetIndex;
  });
  renderAllCommentaryPanels();
}

function renderReviewControls(){
  const total = getCurrentPly();
  const displayPly = getDisplayPly();
  reviewPrevBtn.disabled = displayPly <= 0;
  reviewNextBtn.disabled = displayPly >= total;
  reviewStatusEl.textContent = total === 0
    ? '현재 0 / 0'
    : (isReviewing() ? `리뷰 ${displayPly} / ${total}` : `현재 ${displayPly} / ${total}`);
  updateAIReviewButton();
  updateAISceneJumpButtons();
}

function getAICommentaryPlys(){
  return getOrderedCommentaryEntries()
    .filter((entry) => entry.analysis?.color === playerColor && entry.aiReviewNote)
    .map((entry) => entry.ply)
    .sort((a, b) => a - b);
}

function getAdjacentAICommentaryPly(direction){
  const currentPly = getDisplayPly();
  const plys = getAICommentaryPlys();
  if (direction < 0) return [...plys].reverse().find((ply) => ply < currentPly) ?? null;
  return plys.find((ply) => ply > currentPly) ?? null;
}

function updateAISceneJumpButtons(){
  const reviewReady = aiGameReviewState === 'done';
  reviewPrevAiBtn.disabled = !reviewReady || getAdjacentAICommentaryPly(-1) === null;
  reviewNextAiBtn.disabled = !reviewReady || getAdjacentAICommentaryPly(1) === null;
}

function jumpToAICommentary(direction){
  const targetPly = getAdjacentAICommentaryPly(direction);
  if (targetPly !== null) setReviewPly(targetPly);
}

function setReviewPly(nextPly){
  const total = getCurrentPly();
  reviewPly = nextPly >= total ? null : Math.max(0, nextPly);
  selected = null;
  legalTargets = [];
  clearMoveAnimation();
  syncCommentaryToReview();
  renderReviewControls();
  updateHintDisplay();
  renderEvaluationText();
  updateStatus();
}

function resetCommentaryHistory(){
  commentaryHistory = {w:[], b:[]};
  commentaryIndex = {w:-1, b:-1};
  pendingCommentaries = [];
  analysisGeneration += 1;
  analysisQueue = [];
  activeAnalysisJob = null;
  analysisCache = new Map();
  if (engineWorkerUrl) startAnalysisEngine();
  latestAnalysis = {fen:null, lines:[]};
  stableHintAnalysis = {fen:null, lines:[]};
  aiGameReviewState = 'idle';
  aiGameReviewResult = null;
  aiGameReviewMeta = null;
  aiGameReviewPanel.hidden = true;
  aiGameReviewPanel.replaceChildren();
  syncCommentaryToReview();
  updateHintDisplay();
}

function setCommentaryMessageForColor(color, text){
  const history = commentaryHistory[color];
  const index = commentaryIndex[color];
  if (!history.length || index < 0) return;
  history[index].text = text;
  renderCommentaryPanel(color);
}

function getGeminiEndpoint(){
  try {
    const url = new URL(GEMINI_WORKER_URL);
    return url.protocol === 'https:' ? url.toString() : '';
  } catch {
    return '';
  }
}

function setGeminiConnectionStatus(message, state = ''){
  geminiConnectionStatusEl.textContent = message;
  geminiConnectionStatusEl.dataset.state = state;
}

function refreshGeminiConnectionStatus(){
  setGeminiConnectionStatus(GEMINI_WORKER_URL ? '게임 종료 후 1회 호출' : 'Worker 주소가 설정되지 않았습니다.');
}

function getOrderedCommentaryEntries(){
  return [...commentaryHistory.w, ...commentaryHistory.b].sort((a, b) => a.ply - b.ply);
}

function updateAIReviewButton(){
  if (aiGameReviewState === 'loading'){
    aiGameReviewBtn.disabled = true;
    aiGameReviewBtn.textContent = '리뷰 작성 중...';
    return;
  }
  if (aiGameReviewState === 'done'){
    aiGameReviewBtn.disabled = false;
    aiGameReviewBtn.textContent = 'AI 리뷰 다시 보기';
    return;
  }
  const entries = getOrderedCommentaryEntries();
  const analysisReady = entries.length > 0 && entries.every((entry) => entry.analysis);
  aiGameReviewBtn.disabled = !game.game_over() || !analysisReady || pendingCommentaries.length > 0;
  aiGameReviewBtn.textContent = game.game_over() && !analysisReady ? '분석 준비 중...' : 'AI 전체 리뷰';
}

function getGameResultLabel(){
  if (game.in_checkmate()) return game.turn() === 'w' ? '흑 승' : '백 승';
  if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) return '무승부';
  return '진행 중';
}

function buildReviewExportData(){
  if (!aiGameReviewResult || aiGameReviewState !== 'done') return null;
  const moves = getOrderedCommentaryEntries().map((entry) => ({
    ply:entry.ply,
    san:entry.san,
    color:entry.analysis?.color || '',
    stockfish:{
      classification:entry.text?.title || entry.analysis?.classification?.label || '',
      deltaCp:Number.isFinite(entry.analysis?.deltaCp) ? Math.round(entry.analysis.deltaCp) : null,
      rawDeltaCp:Number.isFinite(entry.analysis?.rawDeltaCp) ? Math.round(entry.analysis.rawDeltaCp) : null,
      bestMove:entry.analysis?.bestMove || '',
      followedHint:Boolean(entry.analysis?.followedHint),
      matchedEngineBest:Boolean(entry.analysis?.matchedEngineBest),
      candidateRank:Number.isFinite(entry.analysis?.candidateRank) ? entry.analysis.candidateRank : null,
      comparisonSource:entry.analysis?.comparisonSource || '',
      reasons:Array.isArray(entry.text?.body) ? [...entry.text.body] : [],
      expected:entry.text?.expected || '',
      alternative:entry.text?.alternative || '',
      rule:entry.analysis?.classification?.rule || '',
      materialLoss:entry.analysis?.consequence?.materialLoss || 0,
      mateAgainstMover:Boolean(entry.analysis?.consequence?.mateAgainstMover)
    },
    aiComment:entry.aiReviewNote ? {...entry.aiReviewNote} : null
  }));
  return {
    schemaVersion:1,
    app:'Chess Study',
    exportedAt:new Date().toISOString(),
    game:{
      result:getGameResultLabel(),
      pgn:game.pgn(),
      finalFen:game.fen(),
      moveCount:game.history().length,
      playerColor,
      playMode,
      skill:playMode === 'engine' ? currentSkill : null
    },
    ai:{
      model:aiGameReviewMeta?.model || '',
      coachStyle:aiGameReviewMeta?.coachStyle || geminiCoachStyle,
      createdAt:aiGameReviewMeta?.createdAt || ''
    },
    review:JSON.parse(JSON.stringify(aiGameReviewResult)),
    moves
  };
}

function exportCurrentReview(event){
  const data = buildReviewExportData();
  if (!data) return;
  const button = event?.currentTarget;
  try {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:'application/json;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-');
    link.href = url;
    link.download = `chess-review-${stamp}.json`;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    if (button){
      button.textContent = '저장 완료';
      setTimeout(() => { button.textContent = '리뷰 내보내기'; }, 1400);
    }
  } catch {
    if (button){
      button.textContent = '저장 실패';
      setTimeout(() => { button.textContent = '리뷰 내보내기'; }, 1400);
    }
  }
}

function applyAIReviewMoments(result){
  getOrderedCommentaryEntries().forEach((entry) => { delete entry.aiReviewNote; });
  (result.moments || []).forEach((moment) => {
    const entry = getOrderedCommentaryEntries().find((candidate) => (
      candidate.analysis?.color === playerColor &&
      candidate.ply === Number(moment.ply) && candidate.san === String(moment.san || '')
    ));
    if (entry) entry.aiReviewNote = {
      title:moment.title || '',
      comment:moment.comment || '',
      innerThought:moment.innerThought || ''
    };
  });
}

async function requestGeminiGameReview(){
  const endpoint = getGeminiEndpoint();
  if (!endpoint || !game.game_over() || aiGameReviewState === 'loading') return;
  if (aiGameReviewState === 'done' && aiGameReviewResult){
    renderAIReviewSummary(aiGameReviewResult);
    setReviewPly(0);
    return;
  }
  const entries = getOrderedCommentaryEntries();
  if (!entries.length || entries.some((entry) => !entry.analysis)) return;
  const coachStyle = AI_COACH_STYLES[geminiCoachStyle]?.instruction || AI_COACH_STYLES[DEFAULT_AI_COACH_STYLE]?.instruction || '';
  const reviewMoves = entries.filter((entry) => entry.analysis.color === playerColor).map((entry) => ({
    ply:entry.ply,
    san:entry.san,
    color:entry.analysis.color,
    classification:entry.text?.title || entry.analysis.classification?.label || '',
    deltaCp:Number.isFinite(entry.analysis.deltaCp) ? Math.round(entry.analysis.deltaCp) : null,
    rawDeltaCp:Number.isFinite(entry.analysis.rawDeltaCp) ? Math.round(entry.analysis.rawDeltaCp) : null,
    bestMove:entry.analysis.bestMove || '',
    followedHint:Boolean(entry.analysis.followedHint),
    matchedEngineBest:Boolean(entry.analysis.matchedEngineBest),
    candidateRank:Number.isFinite(entry.analysis.candidateRank) ? entry.analysis.candidateRank : null,
    comparisonSource:entry.analysis.comparisonSource || '',
    reasons:Array.isArray(entry.text?.body) ? entry.text.body : [],
    expected:entry.text?.expected || '',
    alternative:entry.text?.alternative || '',
    rule:entry.analysis.classification?.rule || '',
    materialLoss:entry.analysis.consequence?.materialLoss || 0,
    mateAgainstMover:Boolean(entry.analysis.consequence?.mateAgainstMover),
    verifiedTactic:Boolean(entry.analysis.verifiedTactic),
    isCheck:entry.analysis.move?.san?.includes('+') || false,
    isMate:entry.analysis.move?.san?.includes('#') || false,
    captured:entry.analysis.move?.captured || '',
    promotion:entry.analysis.move?.promotion || ''
  }));
  let aiRequest;
  try {
    aiRequest = ChessAIReview.createRequest({
      playerColor,
      result:getGameResultLabel(),
      pgn:game.pgn(),
      moves:reviewMoves,
      coachStyle
    });
  } catch {
    setGeminiConnectionStatus('AI 리뷰 데이터를 만들지 못했습니다.', 'error');
    return;
  }
  aiGameReviewState = 'loading';
  updateAIReviewButton();
  setGeminiConnectionStatus('전체 경기를 리뷰하는 중...', '');

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(aiRequest)
    });
    if (!response.ok){
      let detail = '';
      try {
        const error = await response.json();
        detail = String(error?.error || '').trim().slice(0, 100);
      } catch {
        // The status code still identifies a Worker-level failure.
      }
      setGeminiConnectionStatus(detail || `Gemini 연결 실패 (${response.status})`, 'error');
      aiGameReviewState = 'idle';
      updateAIReviewButton();
      return;
    }

    const responseData = await response.json();
    const result = ChessAIReview.parseResponse(responseData.text, reviewMoves, playerColor);
    if (!result) throw new Error('invalid-review');
    const usedModel = String(responseData.model || aiRequest.model || '').trim();
    aiGameReviewResult = result;
    aiGameReviewMeta = {
      model:usedModel,
      coachStyle:geminiCoachStyle,
      createdAt:new Date().toISOString()
    };
    aiGameReviewState = 'done';
    applyAIReviewMoments(result);
    renderAIReviewSummary(result);
    setGeminiConnectionStatus(usedModel ? `Gemini 연결됨 · ${usedModel}` : 'Gemini 연결됨', 'success');
    setReviewPly(0);
    updateAIReviewButton();
  } catch {
    setGeminiConnectionStatus('Gemini 연결 실패: Worker 설정을 확인하세요.', 'error');
    aiGameReviewState = 'idle';
    updateAIReviewButton();
  }
}

function queueMoveCommentary(move, prevFen, hintSnapshot = null){
  const color = move.color;
  if (!opponentCommentaryEnabled && color !== playerColor) return;
  latestEval = null;
  renderEvaluationText();
  const entry = {
    ply: game.history().length,
    san: move.san,
    text: move.san.includes('#')
      ? '체크메이트'
      : '분석 중…',
    analysis:null
  };
  commentaryHistory[color].push(entry);
  commentaryIndex[color] = commentaryHistory[color].length - 1;
  pendingCommentaries.push({
    ply: game.history().length,
    move,
    fenBefore:prevFen,
    fenAfter:game.fen(),
    color,
    index:commentaryIndex[color],
    entry,
    hintSnapshot,
    generation:analysisGeneration
  });
  enqueuePositionAnalysis(prevFen);
  enqueuePositionAnalysis(game.fen());
  renderCommentaryPanel(color);
}

function finalizeReadyCommentaries(){
  const waiting = [];
  pendingCommentaries.forEach((pending) => {
    if (pending.generation !== analysisGeneration) return;
    const before = analysisCache.get(pending.fenBefore);
    const after = analysisCache.get(pending.fenAfter);
    if (!before || !after){
      waiting.push(pending);
      return;
    }
    const currentEntry = commentaryHistory[pending.color][pending.index];
    if (currentEntry !== pending.entry) return;
    const record = ChessCoachAnalysis.createMoveRecord({
      Chess,
      ply:pending.ply,
      move:pending.move,
      fenBefore:pending.fenBefore,
      fenAfter:pending.fenAfter,
      beforeEval:before.eval,
      afterEval:after.eval,
      beforeAnalysis:before,
      afterAnalysis:after,
      hintSnapshot:pending.hintSnapshot
    });
    const content = buildMoveCommentary(record);
    currentEntry.analysis = record;
    currentEntry.text = content;
    renderCommentaryPanel(pending.color);
  });
  pendingCommentaries = waiting;
  updateAIReviewButton();
}

function renderEvaluationText(){
  const evalEl = document.getElementById('evaluationText');
  if (!evalEl) return;

  if (isReviewing()){
    evalEl.textContent = '리뷰 중';
    evalEl.style.color = 'var(--muted)';
    return;
  }

  if (!latestEval){
    evalEl.textContent = '0.00';
    evalEl.style.color = 'var(--ivory)';
    return;
  }

  if (latestEval.type === 'cp') {
    const score = (latestEval.scoreW / 100).toFixed(2);
    const sign = latestEval.scoreW > 0 ? '+' : '';
    evalEl.textContent = sign + score;
    evalEl.style.color = latestEval.scoreW > 0
      ? 'var(--good)'
      : latestEval.scoreW < 0
        ? 'var(--danger)'
        : 'var(--ivory)';
    return;
  }

  if (latestEval.scoreW > 0) {
    evalEl.textContent = 'M' + latestEval.scoreW;
    evalEl.style.color = 'var(--good)';
  } else if (latestEval.scoreW < 0) {
    evalEl.textContent = '-M' + Math.abs(latestEval.scoreW);
    evalEl.style.color = 'var(--danger)';
  } else {
    evalEl.textContent = 'M0';
    evalEl.style.color = 'var(--ivory)';
  }
}

function applyUciMove(uci){

function maybeEngineMove(){

  if (playMode !== 'engine'){

  if (game.turn() !== playerColor){
    requestEngineMove();
  } else {
    requestBackgroundEval();
  }
}

/* ---------------- Rendering ---------------- */
function squareId(file, rank){
  return 'abcdefgh'[file] + (rank+1);
}

function buildAnimationPlan(move){
  const hiddenSquares = [move.to];
  const pieces = [{from: move.from, to: move.to, pieceKey: move.color + move.piece}];

  if (move.flags.includes('k') || move.flags.includes('q')){
    const rank = move.color === 'w' ? '1' : '8';
    const rookFrom = move.flags.includes('k') ? 'h' + rank : 'a' + rank;
    const rookTo = move.flags.includes('k') ? 'f' + rank : 'd' + rank;
    hiddenSquares.push(rookTo);
    pieces.push({from: rookFrom, to: rookTo, pieceKey: move.color + 'r'});
  }

  return {hiddenSquares, pieces};
}

function animateMove(move){
  animationToken += 1;
  const currentToken = animationToken;
  pendingAnimation = buildAnimationPlan(move);
  render();

  const layerRect = pieceFxLayer.getBoundingClientRect();
  pieceFxLayer.innerHTML = '';

  const animations = pendingAnimation.pieces.map((item) => {
    const fromSq = boardEl.querySelector(`[data-square="${item.from}"]`);
    const toSq = boardEl.querySelector(`[data-square="${item.to}"]`);
    if (!fromSq || !toSq) return Promise.resolve();

    const fromRect = fromSq.getBoundingClientRect();
    const toRect = toSq.getBoundingClientRect();
    const insetX = fromRect.width * 0.075;
    const insetY = fromRect.height * 0.075;
    const img = document.createElement('img');
    img.className = 'piece-fx';
    img.src = getPieceImage(item.pieceKey);
    img.alt = item.pieceKey;
    img.style.width = (fromRect.width * 0.85) + 'px';
    img.style.height = (fromRect.height * 0.85) + 'px';
    img.style.left = (fromRect.left - layerRect.left + insetX) + 'px';
    img.style.top = (fromRect.top - layerRect.top + insetY) + 'px';
    pieceFxLayer.appendChild(img);

    return new Promise((resolve) => {
      let finished = false;
      const finish = () => {
        if (finished) return;
        finished = true;
        resolve();
      };

      img.addEventListener('transitionend', finish, {once:true});
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          img.style.transform = `translate(${toRect.left - fromRect.left}px, ${toRect.top - fromRect.top}px)`;
        });
      });
      setTimeout(finish, MOVE_ANIMATION_MS + 80);
    });
  });

  Promise.all(animations).then(() => {
    if (currentToken !== animationToken) return;
    pieceFxLayer.innerHTML = '';
    pendingAnimation = null;
    render();
  });
}

function clearMoveAnimation(){
  animationToken += 1;
  pendingAnimation = null;
  pieceFxLayer.innerHTML = '';
}

function syncPieceFxLayer(){
  pieceFxLayer.style.left = boardEl.offsetLeft + 'px';
  pieceFxLayer.style.top = boardEl.offsetTop + 'px';
  pieceFxLayer.style.width = boardEl.offsetWidth + 'px';
  pieceFxLayer.style.height = boardEl.offsetHeight + 'px';
}

function getCapturedPiecesByColor(positionGame, color){
  const remaining = {p:0, n:0, b:0, r:0, q:0, k:0};
  const boardState = positionGame.board();

  boardState.forEach((row) => {
    row.forEach((piece) => {
      if (piece && piece.color === color){
        remaining[piece.type] += 1;
      }
    });
  });

  return CAPTURE_ORDER.flatMap((type) => {
    const lostCount = Math.max(0, STARTING_PIECES[color][type] - remaining[type]);
    return Array.from({length: lostCount}, () => color + type);
  });
}

function renderCapturedPieces(targetEl, positionGame, color){
  const pieces = getCapturedPiecesByColor(positionGame, color);
  targetEl.innerHTML = '';

  if (!pieces.length){
    return;
  }

  const group = document.createElement('div');
  group.className = 'captured-group';
  pieces.forEach((pieceKey) => {
    const img = document.createElement('img');
    img.className = 'captured-piece';
    img.src = getPieceImage(pieceKey);
    img.alt = pieceKey;
    group.appendChild(img);
  });
  targetEl.appendChild(group);
}

function renderCapturedRows(){
  const displayState = getDisplayState();
  const topColor = playerColor === 'w' ? 'b' : 'w';
  const bottomColor = playerColor;
  renderCapturedPieces(capturedTopEl, displayState.game, topColor);
  renderCapturedPieces(capturedBottomEl, displayState.game, bottomColor);
}

function render(){
  boardEl.innerHTML = '';
  const displayState = getDisplayState();
  const positionGame = displayState.game;
  const flip = playerColor === 'b';
  const hintMove = isReviewing() ? null : getHintMove();
  for (let r = 7; r >= 0; r--){
    for (let f = 0; f <= 7; f++){
      const rank = flip ? 7 - r : r;
      const file = flip ? 7 - f : f;
      const id = squareId(file, rank);
      const sqDiv = document.createElement('div');
      sqDiv.className = 'sq ' + (((file+rank)%2===0) ? 'dark' : 'light');
      sqDiv.dataset.square = id;

      if (file === 0){
        const c = document.createElement('span');
        c.className='coord'; c.textContent = rank+1;
        sqDiv.appendChild(c);
      }
      if (rank === 0){
        const c = document.createElement('span');
        c.className='coord coord-file';
        c.textContent = 'abcdefgh'[file];
        sqDiv.appendChild(c);
      }

      const piece = positionGame.get(id);
      const hideAnimatedPiece = pendingAnimation && pendingAnimation.hiddenSquares.includes(id);
      if (piece && !hideAnimatedPiece){
        const img = document.createElement('img');
        img.src = getPieceImage(piece.color + piece.type);
        img.alt = piece.color + piece.type;
        img.style.width = '85%';
        img.style.height = '85%';
        img.style.pointerEvents = 'none';
        sqDiv.appendChild(img);
      }
      if (hintMove){
        if (hintMove.from === id) sqDiv.classList.add('hint-from');
        if (hintMove.to === id){
          sqDiv.classList.add('hint-to');
          if (!piece){
            const hintImg = document.createElement('img');
            hintImg.src = getPieceImage(hintMove.pieceKey);
            hintImg.alt = hintMove.pieceKey;
            hintImg.className = 'hint-piece';
            sqDiv.appendChild(hintImg);
          }
        }
      }

      if (selected === id) sqDiv.classList.add('selected');
      if (displayState.lastMove && (displayState.lastMove.from === id || displayState.lastMove.to === id)) sqDiv.classList.add('lastmove');
      if (positionGame.in_check()){
        const turnColor = positionGame.turn();
        if (piece && piece.type === 'k' && piece.color === turnColor) sqDiv.classList.add('check');
      }
      if (legalTargets.includes(id)){
        const dot = document.createElement('div');
        dot.className = 'dot' + (piece ? ' capture' : '');
        sqDiv.appendChild(dot);
      }

      sqDiv.addEventListener('click', () => onSquareClick(id));
      boardEl.appendChild(sqDiv);
    }
  }
  syncPieceFxLayer();
  renderCapturedRows();
}

function onSquareClick(id){
  if (isReviewing() || engineThinking || game.game_over()) return;
  if (playMode === 'engine' && game.turn() !== playerColor) return;

  if (selected && legalTargets.includes(id)){
    const moves = game.moves({square: selected, verbose:true});
    const target = moves.find(m => m.to === id);
    if (target && target.flags.includes('p')){
      showPromotionPicker(selected, id);
      selected = null; legalTargets = [];
      render();
      return;
    }
    const hintSnapshot = getActiveHintSnapshot();
    const prevFen = game.fen();
    const move = game.move({from: selected, to: id});
    selected = null; legalTargets = [];
    if (move){
      queueMoveCommentary(move, prevFen, hintSnapshot);
      lastMove = {from: move.from, to: move.to};
      animateMove(move);
      appendMoveToList(move);
      updateStatus();
      setTimeout(maybeEngineMove, 200);
      return;
    }
  }

  const piece = game.get(id);
  const activeColor = playMode === 'local' ? game.turn() : playerColor;
  if (piece && piece.color === activeColor){
    selected = id;
    legalTargets = game.moves({square:id, verbose:true}).map(m => m.to);
  } else {
    selected = null; legalTargets = [];
  }
  render();
}

function showPromotionPicker(from, to){
  promoOverlay.innerHTML = '';
  const movingPiece = game.get(from);
  const color = movingPiece ? movingPiece.color : game.turn();
  ['q','r','b','n'].forEach(p => {
    const btn = document.createElement('button');
    const img = document.createElement('img');
    img.src = getPieceImage(color + p);
    img.alt = color + p;
    img.style.width = '100%';
    img.style.height = '100%';
    btn.appendChild(img);
    btn.addEventListener('click', () => {
      const hintSnapshot = getActiveHintSnapshot();
      const prevFen = game.fen();
      const move = game.move({from, to, promotion:p});
      promoOverlay.classList.remove('show');
      if (move){
        queueMoveCommentary(move, prevFen, hintSnapshot);
        lastMove = {from: move.from, to: move.to};
        animateMove(move);
        appendMoveToList(move);
        updateStatus();
        setTimeout(maybeEngineMove, 200);
      }
    });
    promoOverlay.appendChild(btn);
  });
  promoOverlay.classList.add('show');
}

function appendMoveToList(move){
  const history = game.history({verbose:true});
  movelistEl.innerHTML = '';
  for (let i = 0; i < history.length; i += 2){
    const row = document.createElement('div');
    row.className = 'row';
    const num = document.createElement('span');
    num.className = 'num'; num.textContent = (i/2+1) + '.';
    const w = document.createElement('span');
    w.className = 'mv';
    w.textContent = history[i] ? formatMoveForDisplay(history[i]) : '';
    if (history[i]) w.title = history[i].san;
    const b = document.createElement('span');
    b.className = 'mv';
    b.textContent = history[i+1] ? formatMoveForDisplay(history[i+1]) : '';
    if (history[i+1]) b.title = history[i+1].san;
    row.appendChild(num); row.appendChild(w); row.appendChild(b);
    movelistEl.appendChild(row);
  }
  movelistEl.scrollTop = movelistEl.scrollHeight;
  renderReviewControls();
}

function updateStatus(){
  const displayState = getDisplayState();
  const positionGame = displayState.game;
  statusEl.classList.toggle('thinking', engineThinking);
  statusEl.classList.remove('is-alert');
  if (isReviewing()){
    if (positionGame.in_check()) statusEl.classList.add('is-alert');
    statusText.textContent = `리뷰 중 · ${displayState.ply} / ${getCurrentPly()}수`;
    return;
  }
  if (playMode === 'engine'){
    if (!engine){ return; }
    if (!engineReady){ statusText.textContent = '엔진 준비 중…'; return; }
    if (engineThinking){ statusText.textContent = '엔진이 생각 중…'; return; }
  } else if (engineThinking){
    engineThinking = false;
    statusEl.classList.remove('thinking');
  }

  const evalEl = document.getElementById('evaluationText');
  if (positionGame.in_checkmate()){
    const winner = positionGame.turn() === 'w' ? '흑' : '백';
    statusEl.classList.add('is-alert');
    statusText.textContent = '체크메이트 — ' + winner + ' 승리';
    if (evalEl) {
      evalEl.textContent = winner === '백' ? 'M0' : '-M0';
      evalEl.style.color = winner === '백' ? 'var(--good)' : 'var(--danger)';
    }
    return;
  }
  if (positionGame.in_draw() || positionGame.in_stalemate() || positionGame.in_threefold_repetition()){
    statusEl.classList.add('is-alert');
    statusText.textContent = '무승부';
    if (evalEl) {
      evalEl.textContent = '0.00';
      evalEl.style.color = 'var(--ivory)';
    }
    return;
  }
  const turnLabel = playMode === 'local'
    ? (positionGame.turn() === 'w' ? '백 차례' : '흑 차례')
    : (positionGame.turn() === playerColor ? '당신 차례' : '엔진 차례');
  if (positionGame.in_check()) statusEl.classList.add('is-alert');
  const checkLabel = positionGame.in_check() ? ' · 체크!' : '';
  statusText.textContent = turnLabel + checkLabel;
}

/* ---------------- Controls ---------------- */
document.getElementById('playMode').addEventListener('change', (e) => {
  playMode = e.target.value;
  clearMoveAnimation();
  resetCommentaryHistory();
  selected = null;
  legalTargets = [];
  if (engine) engine.postMessage('stop');

  const sideWhiteEl = document.getElementById('sideWhite');
  const sideBlackEl = document.getElementById('sideBlack');
  const localMode = playMode === 'local';
  difficultyEl.disabled = localMode;
  sideWhiteEl.disabled = localMode;
  sideBlackEl.disabled = localMode;

  if (localMode){
    playerColor = 'w';
    sideWhiteEl.classList.add('active');
    sideBlackEl.classList.remove('active');
  }

  syncOpponentCommentaryUi();
  resetGame();
});

difficultyEl.addEventListener('input', (e) => {
  currentSkill = Math.max(1, Math.min(20, parseInt(e.target.value, 10) || 8));
  currentDiff = getDifficultyConfig(currentSkill);
  syncDifficultyUi();
  if (engine && engineReady){
    engine.postMessage('setoption name Skill Level value ' + currentDiff.skill);
    engine.postMessage('setoption name MultiPV value 3');
  }
  saveUserSettings();
});

pieceThemeEl.addEventListener('change', (e) => {
  currentPieceTheme = e.target.value in PIECE_THEMES ? e.target.value : 'wikimedia';
  clearMoveAnimation();
  render();
  saveUserSettings();
});

boardThemeEl.addEventListener('change', (e) => {
  currentBoardTheme = BOARD_THEME_IDS.has(e.target.value) ? e.target.value : 'wood';
  document.documentElement.dataset.boardTheme = currentBoardTheme === 'wood' ? '' : currentBoardTheme;
  clearMoveAnimation();
  render();
  saveUserSettings();
});

backgroundThemeEl.addEventListener('change', (e) => {
  currentBackgroundTheme = BACKGROUND_THEME_IDS.has(e.target.value) ? e.target.value : 'white';
  document.documentElement.dataset.backgroundTheme = currentBackgroundTheme === 'white' ? '' : currentBackgroundTheme;
  saveUserSettings();
});

geminiCoachStyleEl.addEventListener('change', (e) => {
  geminiCoachStyle = e.target.value in AI_COACH_STYLES ? e.target.value : DEFAULT_AI_COACH_STYLE;
  e.target.value = geminiCoachStyle;
  saveUserSettings();
});

opponentCommentaryToggleEl.addEventListener('change', (e) => {
  setOpponentCommentaryEnabled(e.target.checked);
});

hintToggleEl.addEventListener('change', updateHintDisplay);
opponentHintToggleEl.addEventListener('change', updateHintDisplay);
reviewPrevBtn.addEventListener('click', () => setReviewPly(getDisplayPly() - 1));
reviewNextBtn.addEventListener('click', () => setReviewPly(getDisplayPly() + 1));
reviewPrevAiBtn.addEventListener('click', () => jumpToAICommentary(-1));
reviewNextAiBtn.addEventListener('click', () => jumpToAICommentary(1));
aiGameReviewBtn.addEventListener('click', requestGeminiGameReview);

commentaryViews.w.prevBtn.addEventListener('click', () => {
  if (commentaryIndex.w > 0){
    commentaryIndex.w -= 1;
    renderCommentaryPanel('w');
  }
});
commentaryViews.w.nextBtn.addEventListener('click', () => {
  if (commentaryIndex.w < commentaryHistory.w.length - 1){
    commentaryIndex.w += 1;
    renderCommentaryPanel('w');
  }
});
commentaryViews.b.prevBtn.addEventListener('click', () => {
  if (commentaryIndex.b > 0){
    commentaryIndex.b -= 1;
    renderCommentaryPanel('b');
  }
});
commentaryViews.b.nextBtn.addEventListener('click', () => {
  if (commentaryIndex.b < commentaryHistory.b.length - 1){
    commentaryIndex.b += 1;
    renderCommentaryPanel('b');
  }
});

document.getElementById('sideWhite').addEventListener('click', () => setPlayerColor('w'));
document.getElementById('sideBlack').addEventListener('click', () => setPlayerColor('b'));

function setPlayerColor(c){
  playerColor = c;
  clearMoveAnimation();
  syncOpponentCommentaryUi();
  document.getElementById('sideWhite').classList.toggle('active', c==='w');
  document.getElementById('sideBlack').classList.toggle('active', c==='b');
  resetGame();
}

document.getElementById('newGameBtn').addEventListener('click', resetGame);
document.getElementById('undoBtn').addEventListener('click', () => {
  if (engineThinking) return;
  if (engine) engine.postMessage('stop'); 
  clearMoveAnimation();
  resetCommentaryHistory();
  reviewPly = null;
  game.undo();
  if (playMode === 'engine' && game.turn() !== playerColor) game.undo();
  lastMove = null; selected = null; legalTargets = [];
  render();
  appendMoveToList();
  
  latestEval = null;
  renderEvaluationText();
  updateStatus();
  setTimeout(maybeEngineMove, 200);
});

function resetGame(){
  if (engine) engine.postMessage('stop');
  clearMoveAnimation();
  resetCommentaryHistory();
  game.reset();
  reviewPly = null;
  selected = null; legalTargets = []; lastMove = null; engineThinking = false;
  if (engine && engineReady) engine.postMessage('ucinewgame');
  render();
  movelistEl.innerHTML = '';
  
  latestEval = null;
  renderReviewControls();
  renderEvaluationText();
  updateStatus();
  setTimeout(maybeEngineMove, 200);
}

/* ---------------- Initialization ---------------- */
restoreUserSettings();
loadEngine(); 
render();
renderAllCommentaryPanels();
renderReviewControls();
renderEvaluationText();
updateHintDisplay();
updateStatus();
</script>
</body>
</html>
